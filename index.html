<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Shoujo Player 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pastel: #fff0f5;
            --sidebar-pink: #ffdae9;
            --accent-pink: #ffb3d1;
            --deep-pink: #ff6699;
            --text-dark: #5c3a4d;
            --player-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-pastel);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The App Layout Wrapper */
        .app-container {
            display: flex;
            flex: 1; /* Takes up all space above the bottom player bar */
            height: calc(100vh - 90px);
        }

        /* 1. SIDEBAR (Diary Tabs) */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-pink);
            border-right: 3px dashed var(--accent-pink);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: var(--deep-pink);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item {
            padding: 10px 15px;
            background: #fff;
            border: 2px solid var(--accent-pink);
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 2px 2px 0px var(--accent-pink);
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--deep-pink);
            color: white;
            border-color: var(--deep-pink);
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* 2. MAIN CONTENT AREA (Grid of songs/playlists) */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-image: radial-gradient(#fff 15%, transparent 16%);
            background-size: 20px 20px;
        }

        .main-content h2 {
            font-family: 'Fredoka', sans-serif;
            color: var(--deep-pink);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        /* Polaroid Album Cover Design */
        .polaroid-card {
            background: white;
            padding: 12px 12px 24px 12px;
            border: 1px solid #eee;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .polaroid-card:hover {
            transform: rotate(-2deg) scale(1.03);
        }

        /* Fake Washi Tape on top of Polaroid */
        .tape {
            position: absolute;
            top: -10px;
            left: 35%;
            width: 50px;
            height: 18px;
            background-color: rgba(255, 179, 209, 0.5);
            border: 1px dashed var(--deep-pink);
            transform: rotate(2deg);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            background-color: #ffe6f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .track-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
        }

        .track-artist {
            font-size: 0.85rem;
            color: #8c5270;
            margin-top: 4px;
        }

        /* 3. BOTTOM PLAYER BAR */
        .player-bar {
            height: 90px;
            background-color: var(--player-bg);
            border-top: 3px solid var(--accent-pink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 30%;
        }

        .mini-art {
            width: 50px;
            height: 50px;
            background-color: var(--sidebar-pink);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Center Controls */
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 40%;
        }

        .control-btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            background: var(--deep-pink);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(255,102,153,0.4);
        }

        .skip-btn {
            background: none;
            border: none;
            color: var(--deep-pink);
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Pink Timeline Slider */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            font-size: 0.8rem;
        }

        .progress-bar {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #f0e0e5;
            outline: none;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--deep-pink);
            cursor: pointer;
        }

        /* Right Side Utilities (Volume placeholder) */
        .volume-controls {
            width: 30%;
            text-align: right;
            font-size: 1.2rem;
            color: var(--accent-pink);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="logo">✧ shoujo.fm ✧</div>
            <ul class="nav-menu">
                <li class="nav-item active">🏠 Home Diary</li>
                <li class="nav-item">🎧 Shoegaze Mix</li>
                <li class="nav-item">🎀 Liked Tracks</li>
                <li class="nav-item">🌸 Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <h2>Recently Played 🏹</h2>
            
            <div class="music-grid">
                <div class="polaroid-card">
                    <div class="tape"></div>
                    <div class="album-art">☁️</div>
                    <div class="track-title">Cherry-Coloured</div>
                    <div class="track-artist">Cocteau Twins</div>
                </div>

                <div class="polaroid-card">
                    <div class="tape"></div>
                    <div class="album-art">🎸</div>
                    <div class="track-title">When You Sleep</div>
                    <div class="track-artist">MBV</div>
                </div>

                <div class="polaroid-card">
                    <div class="tape"></div>
                    <div class="album-art">🌙</div>
                    <div class="track-title">Chronostasis</div>
                    <div class="track-artist">Kinoko Teikoku</div>
                </div>

                <div class="polaroid-card">
                    <div class="tape"></div>
                    <div class="album-art">🪐</div>
                    <div class="track-title">Fade Into You</div>
                    <div class="track-artist">Mazzy Star</div>
                </div>
            </div>
        </main>

    </div>

    <footer class="player-bar">
        
        <div class="now-playing">
            <div class="mini-art">☁️</div>
            <div>
                <div class="track-title" style="font-size: 0.95rem;">Cherry-Coloured</div>
                <div class="track-artist" style="font-size: 0.8rem;">Cocteau Twins</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-btns">
                <button class="skip-btn">⏮</button>
                <button class="play-btn">▶</button>
                <button class="skip-btn">⏭</button>
            </div>
            <div class="progress-container">
                <span>1:24</span>
                <input type="range" class="progress-bar" min="0" max="100" value="40">
                <span>3:45</span>
            </div>
        </div>

        <div class="volume-controls">
            🔊 💕 📋
        </div>
    </footer>

</body>
</html>
